<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Admin - Quản lý xe - CarShop</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6.5.1 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="src/css/main.css">
    <style>
        body {
            background-color: #f4f6f9;
        }
        .content {
            padding: 30px;
        }
        .admin-card {
            border: 0;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            background-color: #fff;
            padding: 24px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar (col-md-2) -->
            <div class="sidebar col-md-2 p-0">
                <img src="src/img/logo.png" alt="CarShop Logo" class="mx-auto my-3 d-block px-3" style="width: 100%; max-height: 80px; object-fit: contain;">
                <h6 class="text-center text-muted mb-4" style="font-size: 0.8rem; letter-spacing: 1px;">HỆ THỐNG QUẢN TRỊ</h6>
                <ul>
                    <li><a href="./admin.html" class="active"><i class="fa-solid fa-car me-2"></i>Quản lý xe</a></li>
                    <li><a href="./admin_order.html"><i class="fa-solid fa-receipt me-2"></i>Đơn đặt cọc</a></li>
                    <li><a href="./admin_users.html"><i class="fa-solid fa-users me-2"></i>Tài khoản</a></li>
                    <li><a href="./admin_settings.html"><i class="fa-solid fa-gear me-2"></i>Cài đặt</a></li>
                    <li class="border-top border-secondary mt-3">
                        <a href="./index.html"><i class="fa-solid fa-house me-2"></i>Về Trang Chủ</a>
                    </li>
                    <li>
                        <a href="#" onclick="adminLogout(event)" class="text-danger"><i class="fa-solid fa-right-from-bracket me-2"></i>Đăng xuất</a>
                    </li>
                </ul>
            </div>

            <!-- Content Area (col-md-10) -->
            <div class="content col-md-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-primary m-0"><i class="fa-solid fa-gears me-2 text-accent"></i>Quản lý danh sách kho xe</h2>
                    <div class="text-secondary" id="admin-info-display">Đang tải...</div>
                </div>

                <div class="row g-4">
                    <!-- Left Column: Add/Edit Form (col-md-4) -->
                    <div class="col-lg-4">
                        <div class="admin-card">
                            <h5 class="text-primary mb-4" id="form-title">Thêm xe mới vào kho</h5>
                            <form id="car-form">
                                <input type="hidden" id="editingId" value="">
                                
                                <div class="mb-3">
                                    <label for="car-brand" class="form-label fw-bold">Hãng sản xuất</label>
                                    <input type="text" id="car-brand" class="form-control" placeholder="Ví dụ: Toyota, Honda..." required>
                                </div>

                                <div class="mb-3">
                                    <label for="car-model" class="form-label fw-bold">Dòng xe (Model)</label>
                                    <input type="text" id="car-model" class="form-control" placeholder="Ví dụ: Camry, CR-V..." required>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-6">
                                        <label for="car-year" class="form-label fw-bold">Năm sản xuất</label>
                                        <input type="number" id="car-year" class="form-control" min="2015" max="2026" placeholder="2024" required>
                                    </div>
                                    <div class="col-6">
                                        <label for="car-stock" class="form-label fw-bold">Tồn kho</label>
                                        <input type="number" id="car-stock" class="form-control" min="0" placeholder="1" required>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="car-price" class="form-label fw-bold">Giá bán (VNĐ)</label>
                                    <input type="number" id="car-price" class="form-control" placeholder="Giá xe" required>
                                </div>

                                <div class="mb-3">
                                    <label for="car-type" class="form-label fw-bold">Kiểu dáng</label>
                                    <select id="car-type" class="form-select" required>
                                        <option value="Sedan">Sedan</option>
                                        <option value="SUV">SUV</option>
                                        <option value="Pickup">Bán tải (Pickup)</option>
                                        <option value="Hatchback">Hatchback</option>
                                        <option value="MPV">MPV</option>
                                    </select>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-6">
                                        <label for="car-fuel" class="form-label fw-bold">Động cơ</label>
                                        <select id="car-fuel" class="form-select" required>
                                            <option value="Xăng">Máy Xăng</option>
                                            <option value="Dầu">Máy Dầu</option>
                                            <option value="Hybrid">Hybrid</option>
                                            <option value="Điện">Động cơ Điện</option>
                                        </select>
                                    </div>
                                    <div class="col-6">
                                        <label for="car-transmission" class="form-label fw-bold">Hộp số</label>
                                        <select id="car-transmission" class="form-select" required>
                                            <option value="Số tự động">Số tự động</option>
                                            <option value="Số sàn">Số sàn</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="car-image" class="form-label fw-bold">Đường dẫn ảnh xe (URL / Path)</label>
                                    <select id="car-image" class="form-select">
                                        <option value="src/img/car1.png">Hình mẫu 1 (Toyota Camry)</option>
                                        <option value="src/img/car2.png">Hình mẫu 2 (Honda CR-V)</option>
                                        <option value="src/img/car3.png">Hình mẫu 3 (Ford Ranger)</option>
                                        <option value="src/img/car4.png">Hình mẫu 4 (Hyundai Tucson)</option>
                                        <option value="src/img/car5.png">Hình mẫu 5 (Mazda CX-5)</option>
                                        <option value="src/img/car6.png">Hình mẫu 6 (Kia Seltos)</option>
                                        <option value="src/img/car7.png">Hình mẫu 7 (Mercedes C200)</option>
                                        <option value="src/img/car8.png">Hình mẫu 8 (BMW 320i)</option>
                                        <option value="src/img/car9.png">Hình mẫu 9 (Audi A4)</option>
                                        <option value="src/img/car10.png">Hình mẫu 10 (VinFast VF8)</option>
                                    </select>
                                    <input type="text" id="car-image-custom" class="form-control mt-2" placeholder="Hoặc nhập URL ảnh tùy chỉnh của bạn">
                                </div>

                                <div class="mb-3">
                                    <label for="car-desc" class="form-label fw-bold">Mô tả chi tiết</label>
                                    <textarea id="car-desc" class="form-control" rows="3" placeholder="Thông số kỹ thuật hoặc giới thiệu thêm..."></textarea>
                                </div>

                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn-primary flex-grow-1" id="save-btn">Lưu thông tin</button>
                                    <button type="button" class="btn-grey" id="cancel-btn" onclick="resetCarForm()">Nhập lại</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Right Column: Cars Table (col-md-8) -->
                    <div class="col-lg-8">
                        <div class="admin-card">
                            <h5 class="text-primary mb-4">Danh sách xe hiện có</h5>
                            <div class="table-responsive">
                                <table class="table align-middle table-hover">
                                    <thead class="table-light">
                                        <tr>
                                            <th>#</th>
                                            <th>Hình ảnh</th>
                                            <th>Hãng & Model</th>
                                            <th>Năm</th>
                                            <th>Giá bán</th>
                                            <th>Kiểu dáng</th>
                                            <th>Tồn kho</th>
                                            <th>Thao tác</th>
                                        </tr>
                                    </thead>
                                    <tbody id="admin-car-list">
                                        <!-- Loaded dynamically via admin.js -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="src/js/firebase-config.js"></script>
    <script src="src/js/local-db.js"></script>
    <script src="src/js/check_session.js"></script>
    <script src="src/js/admin.js"></script>
</body>
</html>
