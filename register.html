<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản - CarShop</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6.5.1 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2>Đăng Ký Tài Khoản</h2>
            <form id="register-form">
                <div class="form-group">
                    <input type="text" id="fullname" placeholder="Họ và tên" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="form-group">
                    <input type="email" id="email" placeholder="Email đăng ký" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="form-group">
                    <input type="tel" id="phone" placeholder="Số điện thoại" required>
                    <i class="fa-solid fa-phone"></i>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="form-group">
                    <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu" required>
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <button type="submit" class="btn-primary">Đăng Ký</button>
            </form>
            <div class="auth-links">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
            </div>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    
    <!-- Config and App Scripts -->
    <script src="src/js/firebase-config.js"></script>
    <script src="src/js/local-db.js"></script>
    <script src="src/js/register.js"></script>
</body>
</html>
