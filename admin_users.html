<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Admin - Tài khoản khách - CarShop</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6.5.1 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="src/css/main.css">
    <style>
        body { background-color: #f4f6f9; }
        .content { padding: 30px; }
        .admin-card { border: 0; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); background-color: #fff; padding: 24px; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="sidebar col-md-2 p-0">
                <img src="src/img/logo.png" alt="CarShop Logo" class="mx-auto my-3 d-block px-3" style="width: 100%; max-height: 80px; object-fit: contain;">
                <h6 class="text-center text-muted mb-4" style="font-size: 0.8rem; letter-spacing: 1px;">HỆ THỐNG QUẢN TRỊ</h6>
                <ul>
                    <li><a href="./admin.html"><i class="fa-solid fa-car me-2"></i>Quản lý xe</a></li>
                    <li><a href="./admin_order.html"><i class="fa-solid fa-receipt me-2"></i>Đơn đặt cọc</a></li>
                    <li><a href="./admin_users.html" class="active"><i class="fa-solid fa-users me-2"></i>Tài khoản</a></li>
                    <li><a href="./admin_settings.html"><i class="fa-solid fa-gear me-2"></i>Cài đặt</a></li>
                    <li class="border-top border-secondary mt-3">
                        <a href="./index.html"><i class="fa-solid fa-house me-2"></i>Về Trang Chủ</a>
                    </li>
                    <li>
                        <a href="#" onclick="adminLogout(event)" class="text-danger"><i class="fa-solid fa-right-from-bracket me-2"></i>Đăng xuất</a>
                    </li>
                </ul>
            </div>

            <!-- Content Area -->
            <div class="content col-md-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="text-primary m-0"><i class="fa-solid fa-users me-2 text-accent"></i>Quản lý Tài khoản Khách Hàng</h2>
                    <div class="text-secondary" id="admin-info-display">Đang tải...</div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-12">
                        <div class="admin-card">
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h5 class="text-primary m-0">Danh sách tài khoản từ Firebase</h5>
                                <button class="btn btn-primary btn-sm" onclick="loadUsers()"><i class="fa-solid fa-rotate-right me-1"></i> Làm mới</button>
                            </div>
                            <div class="table-responsive">
                                <table class="table align-middle table-hover">
                                    <thead class="table-light">
                                        <tr>
                                            <th>#</th>
                                            <th>ID Hệ thống</th>
                                            <th>Họ và Tên</th>
                                            <th>Email</th>
                                            <th>SĐT</th>
                                            <th>Ví tiền (VNĐ)</th>
                                            <th>Quyền</th>
                                        </tr>
                                    </thead>
                                    <tbody id="admin-user-list">
                                        <!-- Loaded dynamically via admin_users.js -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    
    <!-- App Scripts -->
    <script src="src/js/firebase-config.js"></script>
    <script src="src/js/local-db.js"></script>
    <script src="src/js/check_session.js"></script>
    <script src="src/js/admin_users.js"></script>
</body>
</html>
